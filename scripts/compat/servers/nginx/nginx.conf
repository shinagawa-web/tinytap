worker_processes 1;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Placeholders below are replaced by start.sh (sed).
    access_log /tmp/tinytap-nginx-compat-access.log;
    error_log /tmp/tinytap-nginx-compat-error.log;
    sendfile SENDFILE_MODE;
    tcp_nopush TCP_NOPUSH_MODE;

    server {
        listen 8080;

        root TESTDATA_PATH;

        # In-memory response — never touches sendfile regardless of the
        # directive above.
        location /hello {
            default_type text/plain;
            return 200 "Hello, world";
        }

        # Reverse proxy — body comes from the backend via nginx's proxy
        # buffer (write/sendto), not from a file, regardless of `sendfile`.
        # BACKEND_PORT must already have a server serving testdata/.
        location /proxy/ {
            proxy_pass http://127.0.0.1:BACKEND_PORT/;
        }

        location / {
            try_files $uri =404;
        }
    }
}
